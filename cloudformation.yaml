AWSTemplateFormatVersion: '2010-09-09'
Description: ECR repositories for Hays Resume Formatter Agent containers (api, worker, frontend).

Parameters:
  ProjectName:
    Type: String
    Default: hays-resume-formatter-agent
    Description: Prefix used for ECR repository names.

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment suffix for repository names.

Resources:
  ApiRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ProjectName}-api-${Environment}"
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Retain last 30 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 30
                },
                "action": { "type": "expire" }
              }
            ]
          }

  WorkerRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ProjectName}-worker-${Environment}"
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Retain last 30 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 30
                },
                "action": { "type": "expire" }
              }
            ]
          }

  FrontendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ProjectName}-frontend-${Environment}"
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Retain last 30 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 30
                },
                "action": { "type": "expire" }
              }
            ]
          }

Outputs:
  ApiRepositoryName:
    Value: !Ref ApiRepository
  WorkerRepositoryName:
    Value: !Ref WorkerRepository
  FrontendRepositoryName:
    Value: !Ref FrontendRepository
  ApiRepositoryUri:
    Value: !GetAtt ApiRepository.RepositoryUri
  WorkerRepositoryUri:
    Value: !GetAtt WorkerRepository.RepositoryUri
  FrontendRepositoryUri:
    Value: !GetAtt FrontendRepository.RepositoryUri
