AWSTemplateFormatVersion: '2010-09-09'
Description: ECR repositories for Hays Resume Formatter Agent containers (api, worker, frontend).

Parameters:
  ProjectName:
    Type: String
    Default: hays-resume-formatter-agent
    Description: Prefix used for ECR repository names.

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment suffix for repository names.
  CreateApiRepo:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  CreateWorkerRepo:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  CreateFrontendRepo:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  ShouldCreateApiRepo: !Equals [ !Ref CreateApiRepo, "true" ]
  ShouldCreateWorkerRepo: !Equals [ !Ref CreateWorkerRepo, "true" ]
  ShouldCreateFrontendRepo: !Equals [ !Ref CreateFrontendRepo, "true" ]

Resources:
  ApiRepository:
    Type: AWS::ECR::Repository
    Condition: ShouldCreateApiRepo
    Properties:
      RepositoryName: !Sub "${ProjectName}-api-${Environment}"
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Retain last 30 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 30
                },
                "action": { "type": "expire" }
              }
            ]
          }

  WorkerRepository:
    Type: AWS::ECR::Repository
    Condition: ShouldCreateWorkerRepo
    Properties:
      RepositoryName: !Sub "${ProjectName}-worker-${Environment}"
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Retain last 30 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 30
                },
                "action": { "type": "expire" }
              }
            ]
          }

  FrontendRepository:
    Type: AWS::ECR::Repository
    Condition: ShouldCreateFrontendRepo
    Properties:
      RepositoryName: !Sub "${ProjectName}-frontend-${Environment}"
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Retain last 30 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 30
                },
                "action": { "type": "expire" }
              }
            ]
          }

Outputs:
  ApiRepositoryName:
    Value: !If [ShouldCreateApiRepo, !Ref ApiRepository, !Sub "${ProjectName}-api-${Environment}"]
  WorkerRepositoryName:
    Value: !If [ShouldCreateWorkerRepo, !Ref WorkerRepository, !Sub "${ProjectName}-worker-${Environment}"]
  FrontendRepositoryName:
    Value: !If [ShouldCreateFrontendRepo, !Ref FrontendRepository, !Sub "${ProjectName}-frontend-${Environment}"]
  ApiRepositoryUri:
    Value: !If [ShouldCreateApiRepo, !GetAtt ApiRepository.RepositoryUri, !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-api-${Environment}"]
  WorkerRepositoryUri:
    Value: !If [ShouldCreateWorkerRepo, !GetAtt WorkerRepository.RepositoryUri, !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-worker-${Environment}"]
  FrontendRepositoryUri:
    Value: !If [ShouldCreateFrontendRepo, !GetAtt FrontendRepository.RepositoryUri, !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-frontend-${Environment}"]
