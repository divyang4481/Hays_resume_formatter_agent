services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./src/frontend:/usr/share/nginx/html

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload --root-path ""
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - CLOUD_PROVIDER=aws
      - RUNTIME_MODE=aws
      - PROCESSING_MODE=async
      - QUEUE_PROVIDER=sqs
      - STORAGE_PROVIDER=s3
      - AGENT_PROVIDER=python_orchestrated
      - KNOWLEDGE_PROVIDER=bedrock_kb
      - LLM_BACKEND=aws_bedrock
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - S3_BUCKET=${S3_BUCKET:-${S3BUCKETNAME}}
      - S3_BUCKET_INPUT=${S3_BUCKET_INPUT:-${S3BUCKETNAME}}
      - S3_BUCKET_OUTPUT=${S3_BUCKET_OUTPUT:-${S3BUCKETNAME}}
      - SQS_PROCESSING_QUEUE_URL=${SQS_PROCESSING_QUEUE_URL:-${SQSQUEUEURL}}
      - SQS_TEMPLATE_ANALYSIS_QUEUE_URL=${SQS_TEMPLATE_ANALYSIS_QUEUE_URL:-${SQSQUEUEURL}}
      - SQS_RESUME_FORMAT_QUEUE_URL=${SQS_RESUME_FORMAT_QUEUE_URL:-${SQSQUEUEURL}}
      - DATABASE_URL=${DATABASE_URL}
      - BEDROCK_AGENT_ID=${BEDROCK_AGENT_ID}
      - BEDROCK_AGENT_ALIAS_ID=${BEDROCK_AGENT_ALIAS_ID}
      - BEDROCK_KB_ID=${BEDROCK_KB_ID}
    volumes:
      - .:/app
      - ~/.aws:/root/.aws:ro

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: python -m src.worker.main
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - CLOUD_PROVIDER=aws
      - RUNTIME_MODE=aws
      - PROCESSING_MODE=async
      - QUEUE_PROVIDER=sqs
      - STORAGE_PROVIDER=s3
      - AGENT_PROVIDER=python_orchestrated
      - KNOWLEDGE_PROVIDER=bedrock_kb
      - LLM_BACKEND=aws_bedrock
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - S3_BUCKET=${S3_BUCKET:-${S3BUCKETNAME}}
      - S3_BUCKET_INPUT=${S3_BUCKET_INPUT:-${S3BUCKETNAME}}
      - S3_BUCKET_OUTPUT=${S3_BUCKET_OUTPUT:-${S3BUCKETNAME}}
      - SQS_PROCESSING_QUEUE_URL=${SQS_PROCESSING_QUEUE_URL:-${SQSQUEUEURL}}
      - SQS_TEMPLATE_ANALYSIS_QUEUE_URL=${SQS_TEMPLATE_ANALYSIS_QUEUE_URL:-${SQSQUEUEURL}}
      - SQS_RESUME_FORMAT_QUEUE_URL=${SQS_RESUME_FORMAT_QUEUE_URL:-${SQSQUEUEURL}}
      - DATABASE_URL=${DATABASE_URL}
      - BEDROCK_AGENT_ID=${BEDROCK_AGENT_ID}
      - BEDROCK_AGENT_ALIAS_ID=${BEDROCK_AGENT_ALIAS_ID}
      - BEDROCK_KB_ID=${BEDROCK_KB_ID}
    volumes:
      - .:/app
      - ~/.aws:/root/.aws:ro
