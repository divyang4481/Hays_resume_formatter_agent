AWSTemplateFormatVersion: '2010-09-09'
Description: resume-formatter-v2 stack with S3, SQS, RDS and Bedrock config parameter

Parameters:
  ProjectName:
    Type: String
    Default: resume-formatteragent-2
  Environment:
    Type: String
    Default: dev
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
  PublicSubnet1Cidr:
    Type: String
    Default: 10.42.1.0/24
  PublicSubnet2Cidr:
    Type: String
    Default: 10.42.2.0/24
  AllowedIngressCidr:
    Type: String
    Default: 0.0.0.0/0
  DBUsername:
    Type: String
    Default: appuser
    MinLength: 1
    MaxLength: 63
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 41
  DBName:
    Type: String
    Default: resume_agent
  DBInstanceClass:
    Type: String
    Default: db.t4g.micro
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-sonnet-20240620-v1:0

Resources:
  ResumeVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-igw

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref ResumeVpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ResumeVpc
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-public-a

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ResumeVpc
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-public-b

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ResumeVpc

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  ResumeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-${AWS::AccountId}-${AWS::Region}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  TemplateAnalysisDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-${Environment}-template-analysis-dlq
      MessageRetentionPeriod: 1209600

  ResumeFormatDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-${Environment}-resume-format-dlq
      MessageRetentionPeriod: 1209600

  TemplateAnalysisQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-${Environment}-template-analysis
      VisibilityTimeout: 120
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemplateAnalysisDLQ.Arn
        maxReceiveCount: 5

  ResumeFormatQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-${Environment}-resume-format
      VisibilityTimeout: 120
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ResumeFormatDLQ.Arn
        maxReceiveCount: 5

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for resume formatter database
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access for local/demo clients
      VpcId: !Ref ResumeVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref AllowedIngressCidr

  ResumeDB:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub ${ProjectName}-${Environment}
      Engine: postgres
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: '20'
      StorageType: gp3
      PubliclyAccessible: true
      BackupRetentionPeriod: 1
      DeletionProtection: false
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBName: !Ref DBName
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      DBSubnetGroupName: !Ref DBSubnetGroup

  BedrockModelIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/bedrock/model-id
      Type: String
      Value: !Ref BedrockModelId

Outputs:
  StackName:
    Value: !Ref AWS::StackName
  VpcId:
    Value: !Ref ResumeVpc
  PublicSubnet1Id:
    Value: !Ref PublicSubnet1
  PublicSubnet2Id:
    Value: !Ref PublicSubnet2
  BucketName:
    Value: !Ref ResumeBucket
  TemplateAnalysisQueueUrl:
    Value: !Ref TemplateAnalysisQueue
  ResumeFormatQueueUrl:
    Value: !Ref ResumeFormatQueue
  DBEndpoint:
    Value: !GetAtt ResumeDB.Endpoint.Address
  DBPort:
    Value: !GetAtt ResumeDB.Endpoint.Port
  BedrockModelIdParam:
    Value: !Ref BedrockModelIdParameter
